name: release Peon AI

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set version from tag
        run: |
          mvn -B org.eclipse.tycho:tycho-versions-plugin:set-version \
            -DnewVersion=${{ github.ref_name }} \
            --file pom.xml

      - name: Build update site
        run: mvn -B clean verify --file pom.xml

      - name: Upload update site artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: releng/llmpeon-update-site/target/repository

  deploy:
    needs: release
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4