<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="./atom-one-light.min.css">
    <link rel="stylesheet" href="./diff2html.min.css">

    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            color: #1a1a1a;
            background: #fff;
        }

        p {
            margin: 4px;
        }

        .message {
            padding: 2px 8px 4px 8px;
        }

        .message::after {
            content: "";
            display: block;
            border-bottom: 1px solid #e0e0e0;
            margin-top: 4px;
        }

        .message:last-child::after {
            border-bottom: none;
        }

        /* Role label */
        .message::before {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        /* Role-specific styling */
        .message.USER::before {
            content: "You";
            color: #0969da;
        }

        .message.USER {
            border-left: 3px solid #0969da;
            padding-left: 8px;
        }

        .message.AI {
            border-left: 3px solid #1a7f37;
        }

        .message.AI::before {
            content: "Peon";
            color: #1a7f37;
        }

        .message.TOOL,
        .message.THINK {
            font-size: 11px;
            font-style: italic;
            color: #888;
            border-left: 3px solid #ccc;
            padding-left: 12px;
        }

        .message.TOOL::before {
            content: "Tool";
            color: #999;
        }

        .message.THINK::before {
            content: "Thinking";
            color: #999;
        }

        .message.PROBLEM {
            color: #d32f2f;
            border-left: 3px solid #d32f2f;
        }

        .message.PROBLEM::before {
            content: "Problem";
            color: #d32f2f;
        }

        .code-pre {
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 4px;
            right: 2px;
            z-index: 10;
            padding: 2px;
            border: none;
            background: transparent;
            cursor: pointer;
            line-height: 0;
            opacity: 0.8;
        }

        .copy-btn:hover {
            color: #0969da;
            opacity: 1;
        }

        .copy-btn.copied {
            color: #1a7f37;
            opacity: 1;
        }
    </style>

    <script src="./highlight.min.js"></script>
    <script src="./lang/css.min.js"></script>
    <script src="./lang/elixir.min.js"></script>
    <script src="./lang/ini.min.js"></script>
    <script src="./lang/java.min.js"></script>
    <script src="./lang/kotlin.min.js"></script>
    <script src="./lang/less.min.js"></script>
    <script src="./lang/makefile.min.js"></script>
    <script src="./lang/markdown.min.js"></script>
    <script src="./lang/php.min.js"></script>
    <script src="./lang/plaintext.min.js"></script>
    <script src="./lang/python.min.js"></script>
    <script src="./lang/ruby.min.js"></script>
    <script src="./lang/rust.min.js"></script>
    <script src="./lang/scss.min.js"></script>
    <script src="./lang/shell.min.js"></script>
    <script src="./lang/sql.min.js"></script>
    <script src="./lang/typescript.min.js"></script>
    <script src="./lang/xml.min.js"></script>
    <script src="./lang/yaml.min.js"></script>
    <script src="./markdown-it.min.js"></script>
    <script src="./diff2html-ui.min.js"></script>

    <script>
        const COPY_ICON = `
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 24 24"
     width="20"
     height="20"
     fill="currentColor"
     aria-hidden="true">
  <path d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z"/>
</svg>`;

        const md = window.markdownit({
            highlight: function (str, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return '<pre class="code-pre"><code class="hljs">' +
                            hljs.highlight(str, {language: lang, ignoreIllegals: true}).value +
                            '</code>' +
                            '<button class="copy-btn">' + COPY_ICON + '</button>' +
                            '</pre>';
                    } catch (__) { }
                }

                return '<pre><code class="hljs">' + md.utils.escapeHtml(str) + '</code></pre>';
            },
        });

        function toolMessage(message) {
            if (!message) return;
            const container = document.getElementById("chat");
            const last = container.lastElementChild;
            if (last && last.classList.contains('TOOL')) {
                const lines = last.innerHTML.split('<br>').filter(l => l.trim());
                lines.push(message);
                if (lines.length > 10) lines.splice(0, lines.length - 10);
                last.innerHTML = lines.join('<br>');
            } else {
                const div = document.createElement("div");
                div.className = "message TOOL";
                div.innerHTML = message;
                container.appendChild(div);
            }
            window.scrollTo(0, document.body.scrollHeight);
        }

        function appendMessage(message) {
            if (message.role === 'TOOL') {toolMessage(message.message); return;}
            const container = document.getElementById("chat");
            const lastMessage = container.lastElementChild;
            if (lastMessage && lastMessage.classList.contains(message.role)) {
                lastMessage.insertAdjacentHTML('beforeend', md.render(message.message ?? ""));
            } else {
                const div = document.createElement("div");
                div.className = "message " + message.role;
                div.innerHTML = md.render(message.message ?? "");
                container.appendChild(div);
            }
            window.scrollTo(0, document.body.scrollHeight);
        }

        document.addEventListener("click", e => {
            const btn = e.target.closest(".copy-btn");
            if (!btn) return;
            const code = btn.closest(".code-pre")?.querySelector(".hljs");
            if (!code) return;
            const text = code.innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    btn.classList.add('copied');
                    setTimeout(() => btn.classList.remove('copied'), 1500);
                }).catch(err => toolMessage('Failed to copy: ' + err));
            } else {
                // Fallback for Eclipse WebView / file://
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;opacity:0';
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    btn.classList.add('copied');
                    setTimeout(() => btn.classList.remove('copied'), 1500);
                } catch (err) {
                    toolMessage('Failed to copy: ' + err);
                } finally {
                    document.body.removeChild(ta);
                }
            }
        });

        function appendDiff(diffString) {
            const container = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = "message diff";
            container.appendChild(div);

            var diff2htmlUi = new Diff2HtmlUI(div, diffString, {
                drawFileList: false,
                outputFormat: 'line-by-line',
                highlight: true,
                matching: 'lines'
            });
            diff2htmlUi.draw();
            window.scrollTo(0, document.body.scrollHeight);
        }

        function clearMessages() {
            document.getElementById("chat").innerHTML = "";
        }
    </script>
</head>

<body>
    <div id="chat"></div>
</body>

<script>

    if (!window.markdownit) {
        document.getElementById("chat").innerHTML =
            '<div class="message PROBLEM">Failed to load markdown-it</div>';
    }
